name: CI (legacy — superseded by test.yml)

# This workflow is retained for backward compatibility but the canonical
# CI is .github/workflows/test.yml which runs the FULL test suite without
# `|| true` and without the phantom frontend/ directory job.
#
# Per the round-4 auditor's finding #14: the `|| true` on the pytest line
# meant a red test suite would NOT fail the CI job, undermining CI's purpose.
# The phantom frontend-build job pointed at a `frontend/` directory that
# doesn't exist in this repo (the frontend is vanilla JS in static/js/).
#
# Both issues are fixed below: `|| true` removed, frontend-build job removed.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        # Lint warnings don't block — but errors do
        run: ruff check maestro_core maestro_agents maestro_loops maestro_memory maestro_verify maestro_llm maestro_api maestro_auth maestro_meta maestro_hybrid || true

      - name: Format check (black)
        working-directory: backend
        # Format issues don't block CI — they're advisory
        run: black --check maestro_core maestro_agents maestro_loops maestro_memory maestro_verify maestro_llm maestro_api maestro_auth maestro_meta maestro_hybrid || true

      - name: Syntax check
        working-directory: backend
        run: |
          python -c "
          import ast, sys, os
          errors = []
          for root, dirs, files in os.walk('.'):
              if 'node_modules' in root or '.venv' in root: continue
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          with open(path) as fh: ast.parse(fh.read(), path)
                      except SyntaxError as e: errors.append(f'{path}: {e}')
          if errors:
              for e in errors: print(e)
              sys.exit(1)
          print('All Python parses OK')
          "

      - name: Run tests
        working-directory: backend
        # NO `|| true` — test failures MUST fail CI. This was the round-4
        # auditor's finding #14: the `|| true` meant a red suite didn't
        # block merges, which is exactly how the stale-test problem went
        # undetected for an entire refactor cycle.
        run: pytest -v --tb=short
        env:
          MAESTRO_LOG: warning

  docker-build:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: maestroagent/app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the image
        run: |
          docker run -d --name maestro-ci -p 8765:8765 \
            -e MAESTRO_LOG=info \
            maestroagent/app:ci
          sleep 5
          curl -sf http://localhost:8765/api/health | head -c 200
          docker logs maestro-ci
          docker rm -f maestro-ci
