# MaestroAgent CI — runs the full test suite on every push and PR.
#
# This transforms "the coder says tests pass" into "CI verifies tests pass."
# The recurring subset-reporting pattern (round 3: 837+ claimed with 18
# failures; round 8: 9 of 27 tests run with 3 failing) is structurally
# impossible when CI runs the complete suite on every push.
#
# The workflow runs:
#   1. Install dependencies (including PyJWT, cryptography, psycopg2-binary)
#   2. Run the FULL pytest suite (not a subset)
#   3. Run verify_loop_closed.py (learning loop must close)
#   4. Upload test results as an artifact
#
# Blocks merges on failure. Python 3.11 and 3.12 matrix.

name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  MAESTRO_DEMO_SEED: "true"
  MAESTRO_ADMIN_PASSWORD: "ci-test-password"
  MAESTRO_RATE_LIMIT_RPM: "10000"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install playwright pytest pytest-asyncio httpx
          python -m playwright install chromium --with-deps

      - name: Run full test suite (NOT a subset)
        working-directory: backend
        run: |
          python -m pytest \
            maestro_api/tests/ \
            maestro_auth/tests/ \
            maestro_oem/tests/ \
            --tb=short \
            -v \
            --timeout=120

      - name: Personal Mode Guardrails
        working-directory: backend
        run: |
          python -m pytest \
            maestro_personal/tests/ \
            --tb=short \
            -v \
            --timeout=60

      - name: Verify learning loop is closed
        run: |
          python scripts/verify_loop_closed.py

      - name: Verify no error suppression in tests
        run: |
          if grep -rn "not in.*Failed\|not in.*ERR_\|not in.*500\|not in.*404" backend/tests/ backend/maestro_api/tests/ backend/maestro_auth/tests/ backend/maestro_oem/tests/ 2>/dev/null; then
            echo "ERROR SUPPRESSION DETECTED — BLOCKING COMMIT"
            exit 1
          fi

      - name: E2E Journey Tests (12 phases)
        working-directory: backend
        run: |
          python -m pytest maestro_api/tests/test_e2e_journey.py -v --tb=short --timeout=60
        env:
          MAESTRO_LOCAL_DEV: "true"
          MAESTRO_DEMO_SEED: "true"

      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.12.x
          npm install -g puppeteer
          # Start the server in background
          cd backend && PYTHONPATH=. MAESTRO_LOCAL_DEV=true MAESTRO_DEMO_SEED=true \
            python -c "import uvicorn; from maestro_api.main import create_app; uvicorn.run(create_app(), host='0.0.0.0', port=1420)" &
          SERVER_PID=$!
          sleep 5
          # Run Lighthouse CI
          lhci collect --url http://localhost:1420/app.html --numberOfRuns=1
          lhci assert --config .lighthouserc.json
          kill $SERVER_PID
        continue-on-error: true  # Warn but don't block — Lighthouse needs a real deployment

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-python-${{ matrix.python-version }}
          path: |
            backend/.pytest_cache/
            backend/test-results.xml
          retention-days: 7
