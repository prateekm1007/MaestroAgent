name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  maestro-personal-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn httpx pydantic pytest pytest-asyncio faker
          pip install -e download/MaestroAgent/backend/

      - name: Run Maestro Personal test suite
        working-directory: download/MaestroAgent/maestro-personal
        env:
          PYTHONPATH: src
          MAESTRO_PERSONAL_ALLOW_ARBITRARY_EMAIL: "1"
        run: |
          python -m pytest tests/ -q --tb=short --maxfail=10

      - name: Run security + isolation subset (required gate)
        working-directory: download/MaestroAgent/maestro-personal
        env:
          PYTHONPATH: src
          MAESTRO_PERSONAL_ALLOW_ARBITRARY_EMAIL: "1"
        run: |
          python -m pytest \
            tests/test_critical_cross_user_isolation.py \
            tests/test_p0_audit_fixes.py \
            tests/test_audit_f4_f10_remaining.py \
            tests/test_directive5_security_trust.py \
            tests/test_f8_auth_fail_closed.py \
            tests/test_high1_xss_and_length_cap.py \
            tests/test_f6_silence_false_critical.py \
            tests/test_f4_staleness_consistency.py \
            tests/test_f4_riley_negation_completion.py \
            tests/test_f9_prepare_corrections.py \
            tests/test_f9_extended_all_surfaces.py \
            tests/test_f5_materiality_gate_wiring.py \
            tests/test_ask_ranker_integration.py \
            -q --tb=short
          echo "Security + isolation subset: all required tests passed"

      - name: Run BM25 baseline (reproducibility check)
        working-directory: download/MaestroAgent/maestro-personal
        env:
          PYTHONPATH: src
        run: |
          python evaluation/scoreboard/bm25_baseline.py || echo "BM25 baseline run completed (non-blocking)"

  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true  # backend has known legacy failures
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: download/MaestroAgent
        run: |
          python -m pip install --upgrade pip
          pip install -e backend/

      - name: Run backend test suite
        working-directory: download/MaestroAgent/backend
        run: |
          python -m pytest -q --tb=short --maxfail=5 || echo "Backend suite completed with known legacy failures"
