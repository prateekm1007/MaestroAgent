# Round 49 C6 fix: docker-compose rewritten for actual production assets.
# The old compose file referenced _deprecated/ services. This version runs
# the actual vanilla JS app + PostgreSQL for production-like testing.
#
# Usage:
#   docker compose up -d              # Start everything
#   docker compose up -d app          # Start app only (with SQLite demo)
#   docker compose logs -f app        # View app logs
#   docker compose down               # Stop everything

services:
  # --- App (FastAPI + vanilla JS frontend) ---
  app:
    build: .
    restart: unless-stopped
    ports:
      - "1420:1420"
    environment:
      MAESTRO_APP_DIR: /app
      MAESTRO_DEMO_SEED: "false"  # Never enable demo seed in production
      MAESTRO_AUTH_DB: /data/auth.db
      PYTHONPATH: /app/backend
      # For production, set these:
      # MAESTRO_ENV: production
      # JWT_SECRET: ${JWT_SECRET}
      # MAESTRO_MASTER_KEY: ${MAESTRO_MASTER_KEY}
      # MAESTRO_ADMIN_PASSWORD: ${MAESTRO_ADMIN_PASSWORD}
      # MAESTRO_AUTH_ENABLED: "true"
    volumes:
      - app_data:/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:1420/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- Database (PostgreSQL for production-like testing) ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: maestro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      POSTGRES_DB: maestro
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maestro"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  app_data:
  db_data:
