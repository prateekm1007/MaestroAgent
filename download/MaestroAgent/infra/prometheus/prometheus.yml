# Prometheus configuration for Maestro

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'maestro-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8765']
        labels:
          service: 'api'

  - job_name: 'maestro-worker'
    metrics_path: /metrics
    static_configs:
      - targets: ['worker:8765']
        labels:
          service: 'worker'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
