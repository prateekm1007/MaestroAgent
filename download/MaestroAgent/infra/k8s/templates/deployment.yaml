# Maestro API Deployment (with blue-green + canary support)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maestro-api
  labels:
    app: maestro
    component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: maestro
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.canary.maxSurge | default "25%" }}
      maxUnavailable: {{ .Values.canary.maxUnavailable | default 0 }}
  template:
    metadata:
      labels:
        app: maestro
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "1420"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          ports:
            - containerPort: 1420
              name: http
          env:
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV | quote }}
            - name: PORT
              value: {{ .Values.env.PORT | quote }}
            - name: DATABASE_URL
              value: {{ .Values.database.url | quote }}
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: maestro-secrets
                  key: jwt-secret
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: maestro-secrets
                  key: encryption-key
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
---
# Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maestro-worker
  labels:
    app: maestro
    component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: maestro
      component: worker
  template:
    metadata:
      labels:
        app: maestro
        component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.worker.repository }}:{{ .Values.image.worker.tag }}"
          imagePullPolicy: {{ .Values.image.worker.pullPolicy }}
          env:
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV | quote }}
            - name: WORKER_MODE
              value: "true"
            - name: DATABASE_URL
              value: {{ .Values.database.url | quote }}
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: maestro-secrets
                  key: jwt-secret
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: maestro-api
  labels:
    app: maestro
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 1420
      protocol: TCP
      name: http
  selector:
    app: maestro
    component: api
---
# Secrets
apiVersion: v1
kind: Secret
metadata:
  name: maestro-secrets
type: Opaque
stringData:
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  encryption-key: {{ .Values.secrets.encryptionKey | quote }}
---
# HPA (API)
{{- if .Values.api.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: maestro-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: maestro-api
  minReplicas: {{ .Values.api.hpa.minReplicas }}
  maxReplicas: {{ .Values.api.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.hpa.targetCPUUtilizationPercentage }}
{{- end }}
---
# HPA (Worker)
{{- if .Values.worker.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: maestro-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: maestro-worker
  minReplicas: {{ .Values.worker.hpa.minReplicas }}
  maxReplicas: {{ .Values.worker.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.hpa.targetCPUUtilizationPercentage }}
{{- end }}
---
# Ingress
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: maestro
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: maestro-api
                port:
                  number: 80
          {{- end }}
    {{- end }}
{{- end }}
---
# ServiceMonitor (Prometheus)
{{- if .Values.prometheus.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: maestro-api
  labels:
    app: maestro
spec:
  selector:
    matchLabels:
      app: maestro
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
{{- end }}
---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: maestro-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: maestro
      component: api
