# Maestro Helm Values
image:
  api:
    repository: maestro/api
    tag: latest
    pullPolicy: IfNotPresent
  worker:
    repository: maestro/worker
    tag: latest
    pullPolicy: IfNotPresent

api:
  replicas: 2
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits: { cpu: 1000m, memory: 2Gi }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

worker:
  replicas: 1
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: 500m, memory: 1Gi }
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

database:
  url: postgresql://maestro:maestro@postgresql:5432/maestro

redis:
  url: redis://redis-master:6379

env:
  NODE_ENV: production
  PORT: "8765"

secrets:
  jwtSecret: change-me
  encryptionKey: change-me

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: maestro.app
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: maestro-tls
      hosts: [maestro.app]

postgresql:
  enabled: true
  auth:
    postgresPassword: maestro
    username: maestro
    password: maestro
    database: maestro
  primary:
    persistence:
      size: 50Gi

redis:
  enabled: true
  auth:
    enabled: false

prometheus:
  enabled: true
  serviceMonitor:
    enabled: true

grafana:
  enabled: true
  adminPassword: admin

canary:
  enabled: false
  maxSurge: "25%"
  maxUnavailable: 0
  progressDeadlineSeconds: 300
