apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: db:5432
    database: maestro
    user: maestro
    secureJsonData:
      password: maestro
    jsonData:
      sslmode: disable
      postgresVersion: 1600
