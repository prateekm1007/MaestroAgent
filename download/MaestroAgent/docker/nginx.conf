# nginx — HTTPS reverse proxy for MaestroAgent.
#
# Usage:
#   1. Install nginx + certbot: sudo apt install nginx certbot python3-certbot-nginx
#   2. Copy this file to /etc/nginx/sites-available/maestro and edit the domain.
#   3. sudo ln -s /etc/nginx/sites-available/maestro /etc/nginx/sites-enabled/
#   4. sudo certbot --nginx -d maestro.yourdomain.com  (provisions HTTPS)
#   5. sudo nginx -t && sudo systemctl reload nginx
#
# WebSocket (/ws) requires the Upgrade + Connection headers — included below.

server {
    listen 80;
    server_name maestro.yourdomain.com;

    # Redirect all HTTP to HTTPS (certbot will add the SSL block).
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name maestro.yourdomain.com;

    # certbot will fill in ssl_certificate + ssl_certificate_key here.

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets — cache aggressively.
    location ~* ^/(assets|icons)/ {
        proxy_pass http://localhost:8765;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Manifest + favicon.
    location = /manifest.webmanifest { proxy_pass http://localhost:8765; expires 1d; }
    location = /favicon.ico { proxy_pass http://localhost:8765; expires 1d; }

    # API — never cache.
    location /api/ {
        proxy_pass http://localhost:8765;
        add_header Cache-Control "no-store" always;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket — needs Upgrade headers.
    location /ws/ {
        proxy_pass http://localhost:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep WS connections alive for long-running runs.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA fallback — everything else goes to index.html.
    location / {
        proxy_pass http://localhost:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
