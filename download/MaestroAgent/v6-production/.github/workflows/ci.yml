# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Maestro v6 — CI/CD Pipeline (8 stages)
# Every PR must pass all checks before merge. Production deploy is manual.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maestro_test
  REDIS_URL: redis://localhost:6379
  ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: test-secret-at-least-32-characters-long-for-ci

jobs:
  # ─── Stage 1: Lint ───
  lint:
    name: 1. Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - run: npm run lint

  # ─── Stage 2: Typecheck ───
  typecheck:
    name: 2. Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck

  # ─── Stage 3: Unit tests ───
  unit-tests:
    name: 3. Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - run: npx prisma generate
      - run: npm test -- --coverage
      - name: Check coverage threshold
        run: |
          COVERAGE=$(node -e "const c = require('./coverage/coverage-summary.json'); console.log(c.total.lines.pct)")
          echo "Line coverage: $COVERAGE%"
          if [ $(echo "$COVERAGE < 80" | bc -l) -eq 1 ]; then
            echo "::error::Coverage $COVERAGE% is below 80% threshold"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with: { name: coverage, path: coverage/ }

  # ─── Stage 4: Integration tests (with Postgres + Redis) ───
  integration-tests:
    name: 4. Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: maestro_test }
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm test -- tests/integration/

  # ─── Stage 5: E2E tests ───
  e2e-tests:
    name: 5. E2E Tests
    runs-on: ubuntu-latest
    needs: [integration-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: maestro_test }
        ports: ['5432:5432']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: playwright-report, path: playwright-report/ }

  # ─── Stage 6: Security scan ───
  security-scan:
    name: 6. Security Scan
    runs-on: ubuntu-latest
    needs: [unit-tests]
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high
      - name: CodeQL
        uses: github/codeql-action/init@v3
        with: { languages: javascript-typescript }
      - uses: github/codeql-action/analyze@v3

  # ─── Stage 7: Deploy to staging ───
  deploy-staging:
    name: 7. Deploy to Staging
    runs-on: ubuntu-latest
    needs: [integration-tests, e2e-tests, security-scan]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Build and push to ECR
        run: |
          docker build -t maestro-v6:$${{ github.sha }} .
          docker tag maestro-v6:$${{ github.sha }} ${{ secrets.ECR_URI }}:latest
          docker push ${{ secrets.ECR_URI }}:latest
      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster maestro-staging --service maestro-api --force-new-deployment
      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable --cluster maestro-staging --services maestro-api

  # ─── Stage 8: Deploy to production (manual) ───
  deploy-production:
    name: 8. Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      # Requires manual approval from 2 reviewers
      url: https://app.maestro.com
    steps:
      - name: Deploy to ECS production
        run: |
          aws ecs update-service --cluster maestro-prod --service maestro-api --force-new-deployment
          aws ecs wait services-stable --cluster maestro-prod --services maestro-api
      - name: Verify deployment
        run: |
          curl -f https://app.maestro.com/api/health || exit 1
