name: CI Trust Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  trust-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: maestro-personal
        run: |
          pip install -e ".[dev]"
          pip install slowapi

      - name: Install Node (for mobile typecheck)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: CI Check 1 — Artifact-existence
        working-directory: maestro-personal
        run: python ci_checks/check_artifact_existence.py --max-age-days 7

      - name: CI Check 2 — Baseline-derivation
        working-directory: maestro-personal
        run: python ci_checks/check_baseline_derivation.py

      - name: CI Check 3 — Verdict-consistency
        working-directory: maestro-personal
        run: python ci_checks/check_verdict_consistency.py

      - name: CI Check 4 — Default-install assertion
        working-directory: maestro-personal
        run: python ci_checks/check_default_install.py

      - name: CI Check 5 — Full-suite gate
        working-directory: maestro-personal
        run: python ci_checks/check_full_suite.py
        continue-on-error: true # Phase 0.4 — 9 test-isolation failures remain; gate is advisory until fixed

      - name: Mobile typecheck
        working-directory: maestro-personal/mobile
        run: |
          npm install --legacy-peer-deps
          npx tsc --noEmit
        continue-on-error: true # Advisory until deps are aligned (Phase 2.1)
