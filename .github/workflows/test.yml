# MaestroAgent CI — runs the full test suite on every push and PR.
#
# Round 71: Complete evidence pipeline — JUnit XML, coverage, Playwright traces,
# Lighthouse JSON (5 runs), flake protection (10x), secrets scan, SBOM.
# The "release dossier" the CEO demanded.

name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  MAESTRO_DEMO_SEED: "true"
  MAESTRO_ADMIN_PASSWORD: "ci-test-password"
  MAESTRO_RATE_LIMIT_RPM: "10000"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: download/MaestroAgent/backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install playwright pytest pytest-asyncio httpx pytest-cov
          python -m playwright install chromium --with-deps

      # ─── Step 1a: JUnit XML + Coverage — ALL 16 modules ─────────────
      # M2 fix: previously CI only ran 4 of 16 modules. The other 12 existed
      # on disk and passed when run manually, but were never executed by CI —
      # decorative unless someone remembered to run them by hand. This is the
      # same pattern as C1 (artifact of "fixed" without the wiring that makes
      # it function). Fixed: CI now runs all 16 module test directories.
      - name: Run full test suite with JUnit + coverage (all 16 modules)
        working-directory: download/MaestroAgent/backend
        run: |
          python -m pytest \
            tests/ \
            maestro_api/tests/ \
            maestro_auth/tests/ \
            maestro_oem/tests/ \
            maestro_personal/tests/ \
            maestro_core/tests/ \
            maestro_loops/tests/ \
            maestro_memory/tests/ \
            maestro_verify/tests/ \
            maestro_llm/tests/ \
            maestro_hybrid/tests/ \
            maestro_meta/tests/ \
            maestro_agents/tests/ \
            maestro_plugins/tests/ \
            maestro_cli/tests/ \
            maestro_db/tests/ \
            --tb=short \
            -v \
            --timeout=120 \
            --junit-xml=test-results.xml \
            --cov=maestro_core \
            --cov=maestro_loops \
            --cov=maestro_memory \
            --cov=maestro_verify \
            --cov=maestro_llm \
            --cov=maestro_hybrid \
            --cov=maestro_meta \
            --cov=maestro_agents \
            --cov=maestro_plugins \
            --cov=maestro_cli \
            --cov=maestro_db \
            --cov=maestro_api \
            --cov=maestro_auth \
            --cov=maestro_oem \
            --cov=maestro_personal \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage-html
        env:
          MAESTRO_LOCAL_DEV: "true"
          MAESTRO_DEMO_SEED: "true"

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results-${{ matrix.python-version }}
          path: backend/test-results.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            backend/coverage.xml
            backend/coverage-html/

      # ─── Step 1b: Playwright traces ──────────────────────────────────
      - name: Run Playwright tests with traces
        working-directory: download/MaestroAgent/backend
        run: |
          python -m pytest \
            maestro_api/tests/test_frontend_smoke.py \
            maestro_api/tests/test_cognitive_surfaces.py \
            --tb=short \
            -v \
            --timeout=120
        env:
          MAESTRO_LOCAL_DEV: "true"
          MAESTRO_DEMO_SEED: "true"
          PLAYWRIGHT_TRACE: "on"

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.python-version }}
          path: backend/test-results/

      # ─── Personal Mode Guardrails ────────────────────────────────────
      - name: Personal Mode Guardrails
        working-directory: download/MaestroAgent/backend
        run: |
          python -m pytest \
            maestro_personal/tests/ \
            --tb=short \
            -v \
            --timeout=60
        env:
          MAESTRO_LOCAL_DEV: "true"
          MAESTRO_DEMO_SEED: "true"

      # ─── Verify learning loop ────────────────────────────────────────
      - name: Verify learning loop is closed
        run: |
          python download/MaestroAgent/scripts/verify_loop_closed.py

      # ─── Error suppression gate ──────────────────────────────────────
      - name: Verify no error suppression in tests
        run: |
          if grep -rn "not in.*Failed\|not in.*ERR_\|not in.*500\|not in.*404" download/MaestroAgent/backend/tests/ download/MaestroAgent/backend/maestro_api/tests/ download/MaestroAgent/backend/maestro_auth/tests/ download/MaestroAgent/backend/maestro_oem/tests/ 2>/dev/null; then
            echo "ERROR SUPPRESSION DETECTED — BLOCKING COMMIT"
            exit 1
          fi

      # ─── E2E Journey Tests ───────────────────────────────────────────
      - name: E2E Journey Tests (12 phases)
        working-directory: download/MaestroAgent/backend
        run: |
          python -m pytest maestro_api/tests/test_e2e_journey.py -v --tb=short --timeout=60
        env:
          MAESTRO_LOCAL_DEV: "true"
          MAESTRO_DEMO_SEED: "true"

      # ─── Step 2: Flake protection (10 consecutive runs) ──────────────
      - name: E2E flake test (10 consecutive runs)
        working-directory: download/MaestroAgent/backend
        run: |
          PASS=0
          FAIL=0
          for i in $(seq 1 10); do
            echo "=== Flake run $i/10 ==="
            if python -m pytest maestro_api/tests/test_e2e_journey.py --tb=no -q --timeout=60; then
              PASS=$((PASS+1))
            else
              FAIL=$((FAIL+1))
            fi
          done
          echo "Flake report: $PASS passed, $FAIL failed out of 10 runs" > flake-report.txt
          cat flake-report.txt
          if [ "$FAIL" -gt 0 ]; then
            echo "FLAKE DETECTED — $FAIL/10 runs failed"
            exit 1
          fi
        env:
          MAESTRO_LOCAL_DEV: "true"
          MAESTRO_DEMO_SEED: "true"

      - name: Upload flake report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake-report-${{ matrix.python-version }}
          path: backend/flake-report.txt

      # ─── Step 1c: Lighthouse CI (5 runs, raw JSON) ───────────────────
      - name: Lighthouse CI (5 runs with raw JSON)
        run: |
          npm install -g @lhci/cli@0.12.x
          npm install -g puppeteer
          cd download/MaestroAgent/backend && PYTHONPATH=. MAESTRO_LOCAL_DEV=true MAESTRO_DEMO_SEED=true \
            python -c "import uvicorn; from maestro_api.main import create_app; uvicorn.run(create_app(), host='0.0.0.0', port=1420)" &
          SERVER_PID=$!
          sleep 5
          mkdir -p lighthouse-results
          lhci collect --url http://localhost:1420/app.html --numberOfRuns=5 --outputDirectory=lighthouse-results
          lhci assert --config .lighthouserc.json
          kill $SERVER_PID

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-${{ matrix.python-version }}
          path: lighthouse-results/

      # ─── Step 5: Secrets scan ────────────────────────────────────────
      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Step 5: SBOM generation ─────────────────────────────────────
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./backend
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.python-version }}
          path: sbom.spdx.json
