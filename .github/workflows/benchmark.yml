name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyyaml httpx
      - name: Docker build verification
        run: docker build -t maestro:test . 2>&1 | tail -20
      - name: Runtime container smoke test
        run: |
          docker run -d --name smoke -e MAESTRO_PERSONAL_ENV=dev -e MAESTRO_DEMO_MODE=1 -e OPENROUTER_API_KEY=dummy -e COHERE_API_KEY=dummy -e MAESTRO_PERSONAL_TOKEN=maestro-demo -p 8766:8080 maestro:test
          for i in $(seq 1 30); do curl -sf http://localhost:8766/api/health && break || sleep 2; done
          REG=$(curl -sf -X POST http://localhost:8766/api/auth/register -H "Content-Type: application/json" -d '{"user_email":"smoke@test.com","password":"smoke-test-pass","name":"Smoke"}')
          TOKEN=$(echo "$REG" | python3 -c "import sys,json; d=json.load(sys.stdin); t=d.get('token',''); assert t, f'No token: {d}'; print(t)")
          curl -sf http://localhost:8766/api/llm-status -H "Authorization: Bearer $TOKEN" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('router_loaded') is True, f'R2 failure: {d.get("import_error")}'; print('router_loaded OK')"
          docker rm -f smoke
      - name: Run benchmark
        env:
          BENCHMARK_BASE_URL: https://maestroagent-production.up.railway.app
        run: cd download/MaestroAgent/maestro-personal && python audit/run_benchmark.py --base-url "$BENCHMARK_BASE_URL" --output audit/results/benchmark.json
      - name: Check thresholds
        run: |
          cd download/MaestroAgent/maestro-personal
          python3 -c "import json; d=json.load(open('audit/results/benchmark.json')); assert d['safety_rate']>=1.0; assert d['isolation_rate']>=0.98; assert d['overall_rate']>=0.90; print('PASS')"
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: download/MaestroAgent/maestro-personal/audit/results/
