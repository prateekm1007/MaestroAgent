name: Deploy drift monitor

# Phase 2 of operational autonomy: the agent monitors continuously, not when
# someone asks. This workflow runs every 15 minutes, checks for deploy drift,
# and auto-remediates if RAILWAY_API_TOKEN is available.
#
# If the token is NOT available, it detects drift and reports it (so the
# founder/auditor sees the drift) but cannot trigger the deploy — that's the
# boundary, stated honestly.
#
# Once RAILWAY_API_TOKEN is added as a secret, this workflow becomes fully
# autonomous: detect drift → diagnose → trigger deploy → verify health.

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:  # manual trigger for testing

jobs:
  check-and-remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install httpx

      - name: Run deploy_ops (drift detection + autonomous remediation)
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd download/MaestroAgent/maestro-personal
          PYTHONPATH=src python3 audit/deploy_ops.py

      - name: Create issue if drift detected and cannot remediate
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Deploy drift detected — backend is stale',
              body: [
                'The deploy drift monitor detected that the backend is behind HEAD.',
                '',
                '**Action needed:**',
                'If RAILWAY_API_TOKEN is not set, the agent cannot auto-deploy.',
                'Either:',
                '1. Add RAILWAY_API_TOKEN as a repo secret (preferred — enables full autonomy)',
                '2. Manually trigger a deploy in Railway dashboard',
                '',
                'See the workflow run logs for the drift diagnosis.',
                '',
                `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              ].join('\n'),
              labels: ['deploy-drift', 'ops']
            })
