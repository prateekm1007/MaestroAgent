name: Deploy drift monitor

# Phase 2 of operational autonomy: the agent monitors continuously.
# Runs every 15 minutes, checks for deploy drift, and auto-remediates
# by triggering deploy.yml via workflow_dispatch.
#
# The deploy.yml workflow (triggered on every push) is the PRIMARY deploy
# mechanism. This monitor is the SAFETY NET — it catches any drift that
# somehow slips past the push-triggered deploy (e.g., a deploy that failed
# silently, a manual rollback, a Railway service restart with old image).
#
# Loop: push → Actions deploys + verifies → monitor catches drift every
# 15 min → agent triggers redeploy via workflow_dispatch → health verified.
# No human in the steady state.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-and-remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install httpx

      - name: Check drift and auto-remediate
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd download/MaestroAgent/maestro-personal
          PYTHONPATH=audit:src python3 audit/deploy_ops.py

      - name: Create issue if drift persists and cannot be remediated
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Deploy drift detected — backend is stale',
              body: [
                'The deploy drift monitor detected that the backend is behind HEAD',
                'and could not auto-remediate.',
                '',
                '**Check:**',
                '1. Did the deploy.yml workflow fail? See Actions tab.',
                '2. Is RAILWAY_API_TOKEN set and valid?',
                '3. Is the backend service ID correct?',
                '',
                `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              ].join('\n'),
              labels: ['deploy-drift', 'ops']
            })
