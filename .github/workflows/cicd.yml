name: CI/CD
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: maestro_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -e backend/
          pip install pytest pytest-asyncio prometheus_client
      - name: Run tests
        run: |
          cd backend
          python -m pytest -x --tb=short -q \
            maestro_api/tests/ maestro_auth/tests/ maestro_oem/tests/ \
            maestro_personal/tests/ tests/
        env:
          MAESTRO_APP_DIR: ${{ github.workspace }}
          MAESTRO_DEMO_SEED: 'true'
          MAESTRO_AUTH_DB: /tmp/maestro_test_auth.db
          MAESTRO_ADMIN_PASSWORD: test
          DATABASE_URL: postgresql://postgres:test@localhost:5432/maestro_test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install security tools
        run: |
          pip install pip-audit bandit
          pip install -e backend/
      - name: Run pip-audit
        run: pip-audit -e backend/
        continue-on-error: true
      - name: Run bandit
        run: bandit -r backend/ -ll -x backend/maestro_oem/tests,backend/maestro_api/tests,backend/maestro_auth/tests,backend/maestro_personal/tests
        continue-on-error: true
