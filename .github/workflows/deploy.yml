name: Deploy

# Auto-deploy on every push to main — NO Railway GitHub App needed.
#
# The Railway GitHub App path is a dead end (browser OAuth, can't be
# API-automated). This workflow routes around it: GitHub Actions is
# first-party to the repo (already runs CI on every push), so it can
# check out the code, build the Docker image, and deploy it to Railway
# via the CLI using RAILWAY_API_TOKEN.
#
# The S0 assertion ("live == tested") is baked in: after deploy, poll
# /api/health until commit == github.sha. If it doesn't converge, the
# workflow fails loudly.
#
# REQUIRES (GitHub Actions secrets):
#   - RAILWAY_API_TOKEN          (Railway team/account token)
#   - RAILWAY_BACKEND_SERVICE_ID  (c12adfcf-524d-4b99-8837-9c495065bb5c)
#   - RAILWAY_FRONTEND_SERVICE_ID (6c0de1c4-d255-4f85-b235-cc4f4e1a4697)

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger for testing

jobs:
  deploy-backend:
    name: Deploy backend (Docker build + railway up + health verify)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Build + deploy backend to Railway
        run: railway up --service ${{ secrets.RAILWAY_BACKEND_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}

      - name: Verify deploy converged (S0 assertion — live == tested)
        run: |
          EXPECT="${{ github.sha }}"
          echo "Waiting for backend to converge to commit $EXPECT"
          for i in $(seq 1 40); do
            LIVE=$(curl -s https://maestroagent-production.up.railway.app/api/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('commit',''))" 2>/dev/null || echo "")
            if [ "$LIVE" = "$EXPECT" ]; then
              echo "✓ LIVE == TESTED: $LIVE"
              echo "The deployment visible to users is the commit CI just built."
              exit 0
            fi
            echo "  [$((i*15))s] live=$LIVE expected=$EXPECT — waiting..."
            sleep 15
          done
          echo "✗ DEPLOY DID NOT CONVERGE to $EXPECT after 10 min"
          echo "The backend is still serving a stale commit. Investigate:"
          echo "  - Check Railway dashboard for build/deploy errors"
          echo "  - Check if the Docker build succeeded in the 'railway up' step above"
          exit 1

  deploy-frontend:
    name: Deploy frontend (Next.js build + railway up)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Build + deploy frontend to Railway
        run: railway up --service ${{ secrets.RAILWAY_FRONTEND_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        working-directory: download/MaestroAgent/maestro-personal/web

      - name: Verify frontend deployed
        run: |
          # Frontend doesn't expose a commit endpoint, so we check it's serving
          # the branded shell (not "Loading…") via a fresh fetch.
          for i in $(seq 1 20); do
            HTML=$(curl -s https://web-production-d5c26.up.railway.app/ 2>/dev/null || echo "")
            if echo "$HTML" | grep -q "Maestro"; then
              echo "✓ Frontend serving branded shell (contains 'Maestro')"
              exit 0
            fi
            echo "  [$((i*15))s] waiting for frontend..."
            sleep 15
          done
          echo "✗ Frontend not responding with branded shell after 5 min"
          exit 1
