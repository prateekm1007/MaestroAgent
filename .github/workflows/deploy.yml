name: Deploy

# Auto-deploy on every push to main — NO Railway GitHub App repo trigger.
#
# DESIGN: GitHub Actions is the SINGLE deployer. Railway's GitHub App is
# installed (enables Railway API for monitoring/rollback/commit metadata)
# but repoTriggers is intentionally EMPTY so Railway doesn't also auto-deploy.
# One deployer only — this workflow — with the S0 health assertion baked in.
#
# The cached-image false-success guard: Railway's "SUCCESS" status can fire
# in ~16s when it reuses an old image. Health is the source of truth, not
# Railway's status. If /api/health commit doesn't advance to github.sha,
# the deploy FAILED regardless of what Railway reported.
#
# REQUIRES (GitHub Actions secrets):
#   - RAILWAY_API_TOKEN
#   - RAILWAY_BACKEND_SERVICE_ID  (c12adfcf-524d-4b99-8837-9c495065bb5c)
#   - RAILWAY_FRONTEND_SERVICE_ID (6c0de1c4-d255-4f85-b235-cc4f4e1a4697)
# Never print secret values in logs — reference by name only.

on:
  push:
    branches: [main]
  workflow_dispatch: {}  # allows the agent to trigger on demand for drift remediation

jobs:
  deploy-backend:
    name: Deploy backend (Docker build + railway up + health verify)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Record pre-deploy image digest (for cached-image guard)
        id: pre-digest
        run: |
          DIGEST=$(curl -s https://maestroagent-production.up.railway.app/api/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('commit','unknown'))" 2>/dev/null || echo "unknown")
          echo "Pre-deploy live commit: $DIGEST"
          echo "live_commit_before=$DIGEST" >> $GITHUB_OUTPUT

      - name: Build + deploy backend to Railway
        run: railway up --service ${{ secrets.RAILWAY_BACKEND_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        working-directory: .  # backend Dockerfile is at repo root

      - name: Verify deploy converged (S0 assertion — health is source of truth)
        run: |
          EXPECT="${{ github.sha }}"
          EXPECT_SHORT="${EXPECT:0:7}"
          BEFORE="${{ steps.pre-digest.outputs.live_commit_before }}"
          echo "Waiting for backend to converge:"
          echo "  Expected commit: $EXPECT_SHORT"
          echo "  Pre-deploy commit: $BEFORE"
          echo ""
          for i in $(seq 1 40); do
            LIVE=$(curl -s https://maestroagent-production.up.railway.app/api/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('commit',''))" 2>/dev/null || echo "")
            LIVE_SHORT="${LIVE:0:7}"
            if [ "$LIVE_SHORT" = "$EXPECT_SHORT" ]; then
              echo "✓ LIVE == TESTED: $LIVE_SHORT"
              echo "  Build time: $(curl -s https://maestroagent-production.up.railway.app/api/health | python3 -c 'import sys,json; print(json.load(sys.stdin).get("build_time",""))')"
              echo "The deployment visible to users is the commit CI just built."
              exit 0
            fi
            if [ "$LIVE" = "$BEFORE" ]; then
              echo "  [$((i*15))s] live=$LIVE_SHORT (unchanged from pre-deploy — build may still be running)"
            else
              echo "  [$((i*15))s] live=$LIVE_SHORT (changed but != expected $EXPECT_SHORT)"
            fi
            sleep 15
          done
          echo ""
          echo "✗ DEPLOY DID NOT CONVERGE to $EXPECT_SHORT after 10 min"
          echo ""
          echo "This is the cached-image false-success guard: Railway may have"
          echo "reported SUCCESS but reused the old image. The health endpoint"
          echo "is the source of truth — if commit didn't advance, the deploy"
          echo "failed regardless of Railway's status."
          echo ""
          echo "Investigate:"
          echo "  - Check Railway dashboard for build/deploy errors"
          echo "  - Check if 'railway up' actually built a new image (look for build logs)"
          echo "  - Verify RAILWAY_BACKEND_SERVICE_ID secret is correct"
          exit 1

  deploy-frontend:
    name: Deploy frontend (Next.js build + railway up)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Build + deploy frontend to Railway
        run: railway up --service ${{ secrets.RAILWAY_FRONTEND_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        working-directory: download/MaestroAgent/maestro-personal/web

      - name: Verify frontend serving SSR shell (not Loading…)
        run: |
          echo "Waiting for frontend to serve branded SSR shell..."
          for i in $(seq 1 20); do
            HTML=$(curl -s https://web-production-d5c26.up.railway.app/ 2>/dev/null || echo "")
            if echo "$HTML" | grep -q "Maestro"; then
              echo "✓ Frontend serving branded shell (contains 'Maestro')"
              echo "  SSR shell present (full hydration verified by Playwright in monitoring loop)"
              exit 0
            fi
            echo "  [$((i*15))s] waiting for frontend..."
            sleep 15
          done
          echo "✗ Frontend not responding with branded shell after 5 min"
          exit 1
